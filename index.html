<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NED Vendor Finance — Rate Card</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; padding: 28px 20px; }
  .wrap { max-width: 1000px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .header img { height: 48px; }
  .header-right { text-align: right; }
  h1 { font-size: 24px; font-weight: 700; color: #f1f5f9; margin-bottom: 2px; }
  .sub { font-size: 13px; color: #64748b; margin-bottom: 24px; }

  .slider-card { background: #1e293b; border-radius: 10px; border: 1px solid #334155; padding: 24px 28px; margin-bottom: 28px; }
  .slider-title { font-size: 13px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }
  .slider-main-row { display: flex; align-items: center; gap: 24px; margin-bottom: 8px; }
  .slider-main-row input[type=range] { flex: 1; accent-color: #f59e0b; height: 8px; cursor: pointer; }
  .slider-value { font-size: 28px; font-weight: 800; font-family: 'JetBrains Mono', monospace; color: #f59e0b; min-width: 80px; text-align: right; }
  .slider-bounds { display: flex; justify-content: space-between; font-size: 11px; color: #475569; margin-top: 2px; padding: 0 2px; }
  .slider-sub { font-size: 12px; color: #64748b; margin-top: 8px; }

  .live-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; background: #1e293b; border-radius: 10px; border: 1px solid #334155; overflow: hidden; margin-bottom: 28px; }
  .lm { padding: 18px 20px; border-right: 1px solid #334155; }
  .lm:last-child { border-right: none; }
  .lm-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
  .lm-value { font-size: 22px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: #f1f5f9; }
  .lm-value.rate { color: #f59e0b; }
  .lm-sub { font-size: 11px; color: #94a3b8; margin-top: 3px; }

  .card { background: #1e293b; border-radius: 10px; border: 1px solid #334155; overflow: hidden; margin-bottom: 28px; }
  .card-header { padding: 14px 20px; border-bottom: 1px solid #334155; }
  .card-header span { font-size: 14px; font-weight: 600; color: #f1f5f9; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 11px 14px; text-align: right; color: #64748b; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #334155; white-space: nowrap; }
  th:first-child { text-align: center; }
  td { padding: 10px 14px; text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #e2e8f0; transition: background 0.15s; }
  td:first-child { text-align: center; }
  .row-even { background: transparent; }
  .row-odd { background: #1a2332; }
  .row-active { background: #1a2744 !important; }
  .row-active td { color: #f59e0b; font-weight: 600; }
  tr.data-row { cursor: pointer; }
  tr.data-row:hover { background: #1a2744; }

  .amort-card { background: #1e293b; border-radius: 10px; border: 1px solid rgba(245,158,11,0.27); overflow: hidden; margin-bottom: 28px; }
  .amort-header { padding: 14px 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
  .amort-header .title { font-size: 15px; font-weight: 600; color: #f59e0b; }
  .amort-header .info { font-size: 12px; color: #64748b; margin-left: 12px; }
  .amort-btn { padding: 6px 16px; border-radius: 5px; border: 1px solid #475569; background: transparent; color: #94a3b8; cursor: pointer; font-size: 12px; font-family: 'Inter', sans-serif; }
  .amort-btn.active { border-color: #f59e0b; background: rgba(245,158,11,0.13); color: #f59e0b; }
  .amort-wrap { max-height: 420px; overflow-y: auto; overflow-x: auto; }
  .amort-wrap th { position: sticky; top: 0; background: #1e293b; z-index: 1; font-size: 10px; }
  .amort-wrap td { padding: 6px 14px; font-size: 12px; }
  .int-col { color: #fb923c; }
  .prin-col { color: #34d399; }
  .cum-col { color: #94a3b8; }

  .footer { margin-top: 14px; font-size: 10px; color: #475569; text-align: center; line-height: 1.6; }
</style>
</head>

const fmt = (n) => "$" + Math.round(n).toLocaleString("en-US");
const fmtM = (n) => "$" + (n/1e6).toFixed(2) + "M";
const fmtPct = (n) => n.toFixed(2) + "%";

// Fixed parameters — not customer-adjustable
const CONTRACT = 42297243;
const TERM = 60;
const RATE_FLOOR = 8.50;
const RATE_CEILING = 13.00;
const MIN_DOWN = 15;
const MAX_DOWN = 30;
const LTV_MIN = 100 - MAX_DOWN;
const LTV_MAX = 100 - MIN_DOWN;

let state = { downPct: 22, showAmort: false };

function lerp(ltv) {
  const t = Math.max(0, Math.min(1, (ltv - LTV_MIN) / (LTV_MAX - LTV_MIN)));
  return RATE_FLOOR + t * (RATE_CEILING - RATE_FLOOR);
}

function calc(dpPct) {
  const dp = Math.round(CONTRACT * dpPct / 100);
  const ltv = 100 - dpPct;
  const rate = lerp(ltv);
  const p = CONTRACT - dp;
  const mr = rate / 100 / 12;
  const mo = (p * mr) / (1 - Math.pow(1 + mr, -TERM));
  const tp = mo * TERM;
  const ti = tp - p;
  const tc = dp + tp;
  let bal = p, ci = 0;
  const sched = [];
  for (let m = 1; m <= TERM; m++) {
    const ip = bal * mr, pp = mo - ip;
    bal = Math.max(bal - pp, 0); ci += ip;
    sched.push({ month: m, payment: mo, interest: ip, principal: pp, balance: bal, cumInterest: ci });
  }
  return { dp, rate, principal: p, monthly: mo, totalPmts: tp, totalInt: ti, totalConsid: tc, ltv, downPct: dpPct, sched };
}

function getTiers() {
  const tiers = [];
  for (let dp = MIN_DOWN; dp <= MAX_DOWN; dp += 2) tiers.push({ ...calc(dp), tierPct: dp });
  return tiers;
}

function render() {
  const tiers = getTiers();
  const live = calc(state.downPct);

  let html = `
    <div class="header">

      </div>
    </div>
    <h1>Financing Options</h1>
    <div class="sub">Lumon Solutions LLC / STN Inc. · 8.06 MW Modular Data Center · Springfield, MO · ${TERM}-Month Term · Contract: ${fmtM(CONTRACT)}</div>

    <div class="slider-card">
      <div class="slider-title">Select Your Down Payment</div>
      <div class="slider-main-row">
        <input type="range" id="dpSlider" min="${MIN_DOWN}" max="${MAX_DOWN}" step="1" value="${state.downPct}">
        <div class="slider-value">${state.downPct}%</div>
      </div>
      <div class="slider-bounds"><span>${MIN_DOWN}% (${fmtM(Math.round(CONTRACT * MIN_DOWN / 100))})</span><span>${MAX_DOWN}% (${fmtM(Math.round(CONTRACT * MAX_DOWN / 100))})</span></div>
      <div class="slider-sub">Your execution fee: <strong style="color:#f1f5f9">${fmtM(live.dp)}</strong> · A higher down payment reduces your financed amount and interest rate.</div>
    </div>

    <div class="live-metrics">
      <div class="lm">
        <div class="lm-label">Execution Fee</div>
        <div class="lm-value">${fmtM(live.dp)}</div>
        <div class="lm-sub">${state.downPct}% of contract · non-refundable</div>
      </div>
      <div class="lm">
        <div class="lm-label">Your Interest Rate</div>
        <div class="lm-value rate">${fmtPct(live.rate)}</div>
        <div class="lm-sub">Fixed · ${live.ltv.toFixed(0)}% LTV</div>
      </div>
      <div class="lm">
        <div class="lm-label">Monthly Payment</div>
        <div class="lm-value">${fmt(live.monthly)}</div>
        <div class="lm-sub">× ${TERM} months · fully amortizing</div>
      </div>
      <div class="lm">
        <div class="lm-label">Total Consideration</div>
        <div class="lm-value">${fmtM(live.totalConsid)}</div>
        <div class="lm-sub">Execution fee + all installments</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><span>All Available Tiers</span></div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            ${["Down %","Execution Fee","Financed","LTV","Rate","Monthly","Total Interest","Total Consideration"].map(h => `<th>${h}</th>`).join('')}
          </tr></thead>
          <tbody>
            ${tiers.map((t, i) => {
              const isActive = t.tierPct === state.downPct;
              const cls = isActive ? 'row-active' : (i%2===0 ? 'row-even' : 'row-odd');
              return `<tr class="${cls} data-row" onclick="setDown(${t.tierPct})">
                <td>${t.tierPct}%</td>
                <td>${fmtM(t.dp)}</td>
                <td>${fmtM(t.principal)}</td>
                <td style="color:#94a3b8">${t.ltv.toFixed(1)}%</td>
                <td style="font-weight:600">${fmtPct(t.rate)}</td>
                <td>${fmt(t.monthly)}</td>
                <td>${fmtM(t.totalInt)}</td>
                <td style="font-weight:600;color:#f1f5f9">${fmtM(t.totalConsid)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="amort-card">
      <div class="amort-header">
        <div>
          <span class="title">${state.downPct}% Down — Amortization Schedule</span>
          <span class="info">${fmtM(live.dp)} down · ${fmtPct(live.rate)} · ${fmt(live.monthly)}/mo</span>
        </div>
        <button class="amort-btn ${state.showAmort?'active':''}" onclick="toggleAmort()">${state.showAmort?'Hide':'Show'} Schedule</button>
      </div>
      ${state.showAmort ? `
      <div class="amort-wrap">
        <table>
          <thead><tr>${["Mo.","Payment","Interest","Principal","Balance","Cum. Interest"].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
          <tbody>
            ${live.sched.map((r,ri) => `<tr class="${ri%2===0?'row-even':'row-odd'}">
              <td style="color:#64748b;font-size:11px">${r.month}</td>
              <td>${fmt(r.payment)}</td>
              <td class="int-col">${fmt(r.interest)}</td>
              <td class="prin-col">${fmt(r.principal)}</td>
              <td>${fmt(r.balance)}</td>
              <td class="cum-col">${fmt(r.cumInterest)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>` : ''}
    </div>

    <div class="footer">
      Standard annuity formula · 360/30 day count · Fully amortizing · All amounts USD<br>
      Non-binding — subject to execution of definitive Vendor Finance Agreement<br>
      Northstar Enterprise + Defense, a division of Northstar Technologies Group, Inc.
    </div>`;

  document.getElementById("app").innerHTML = html;

  document.getElementById("dpSlider").addEventListener("input", (e) => {
    state.downPct = parseInt(e.target.value);
    state.showAmort = false;
    render();
  });
}

function setDown(pct) {
  state.downPct = pct;
  state.showAmort = false;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleAmort() {
  state.showAmort = !state.showAmort;
  render();
}

render();
</script>
</body>
</html>
